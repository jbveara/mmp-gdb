# MMP-GDB project config — Zephyr Shell interface
CONFIG_DW3000=y
CONFIG_SPI=y

CONFIG_NEWLIB_LIBC=y

# Shell over UART console — handles all RX input, no custom UART driver needed.
# CONFIG_SHELL=y automatically enables CONFIG_SHELL_BACKEND_SERIAL=y and
# CONFIG_UART_CONSOLE=y on the nRF52840DK.
CONFIG_SHELL=y

# Route log output through the shell backend so log noise doesn't corrupt
# TS lines. Shell ensures log messages are safely interleaved with output.
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_SHELL_LOG_BACKEND=y

# Disable RTT — all comms through UART/shell
CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n

# Heap for dynamic buffers
CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_SERIAL=y
